services:
  mission-control:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - OTEL_ENDPOINT=alloy:4318
      - SERVICE_NAME=mission-control
      - MISSION1_MAX_CARDINALITY=10000
      - MISSION1_GROWTH_RATE=50
      - MISSION4_SECRET=ALPHA_BRAVO_CHARLIE_DELTA_ECHO
      - S3_ENDPOINT=http://localstack:4566
      - TEMPO_ENDPOINT=http://tempo:3200
      - MIMIR_ENDPOINT=http://mimir:9009
    volumes:
      - logs:/var/log/alloy
    # Use tee to write logs to both stdout (for docker logs) and file (for Alloy)
    command: sh -c "./alloy-mission-control 2>&1 | tee /var/log/alloy/mission-control.log"
    networks:
      - alloy-network
    depends_on:
      - alloy

  alloy:
    image: grafana/alloy:v1.15.0@sha256:579582bce40049f2e27bd1e445000689c907a41f0495cb0d0c7f65609316ba7c
    ports:
      - "12347:12345"  # Alloy UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    volumes:
      - ./alloy/:/etc/alloy/:ro
      - logs:/var/log/alloy:ro  # Read-only access to mission-control logs
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --stability.level=experimental
      - /etc/alloy/config.alloy
    networks:
      - alloy-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    ports:
      - "3000:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics correlations
    networks:
      - alloy-network
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.3@sha256:cd6e176883a90c21755f0315688668991634143423f75bdedfef41441b0fdc3c
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml
    command: ["-config.file=/etc/loki/loki.yaml"]
    networks:
      - alloy-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.0@sha256:65a5789759435f1ef696f1953258b9bbdb18eb571d5ce711ff812d2e128288a4
    ports:
      - "3200:3200"
      - "4317"  # OTLP gRPC (not exposed to host)
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - alloy-network
    restart: unless-stopped

  mimir:
    image: grafana/mimir:3.0.2@sha256:4231caf9be780e5d9113449e57a0258d388124aca74c0a14b9cf8857e23aad76
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir.yaml
    command: ["-config.file=/etc/mimir.yaml"]
    networks:
      - alloy-network
    restart: unless-stopped

  localstack:
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    environment:
      - SERVICES=s3
    ports:
      - "4566:4566"  # LocalStack gateway
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - alloy-network
    restart: unless-stopped

  localstack-init:
    image: curlimages/curl:latest@sha256:b3f1fb2a51d923260350d21b8654bbc607164a987e2f7c84a0ac199a67df812a
    depends_on:
      - localstack
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 5
        curl -X PUT http://localstack:4566/audit-logs
    networks:
      - alloy-network

volumes:
  logs:
    driver: local
  grafana:
    driver: local
  localstack-data:
    driver: local

networks:
  alloy-network:
    driver: bridge
